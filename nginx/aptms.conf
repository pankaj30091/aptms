server {
    listen 80;
    server_name aptms.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aptms.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/aptms.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aptms.yourdomain.com/privkey.pem;

    # Proxy to gunicorn
    location / {
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static files served directly by nginx
    location /static/ {
        alias /home/psharma/onedrive/code/aptms/static/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
