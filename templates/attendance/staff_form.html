{% extends "base.html" %}
{% block title %}{% if staff %}Edit Staff{% else %}Add Staff{% endif %}{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-4">
  <a href="{{ url_for('attendance.staff_list') }}" class="text-gray-400 hover:text-gray-600">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h2 class="text-xl font-bold">{% if staff %}Edit Staff{% else %}Add Staff{% endif %}</h2>
</div>

<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Full Name <span class="text-red-500">*</span></label>
      <input type="text" name="full_name" required
             value="{{ staff.full_name if staff else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Role <span class="text-red-500">*</span></label>
      <select name="role" required
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary">
        {% for val, label in roles %}
        <option value="{{ val }}" {{ 'selected' if staff and staff.role == val else '' }}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
      <input type="tel" name="phone"
             value="{{ staff.phone if staff and staff.phone else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    {% if staff %}
    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_active" id="is_active"
             {{ 'checked' if staff.is_active else '' }}
             class="w-4 h-4 text-primary rounded border-gray-300" />
      <label for="is_active" class="text-sm text-gray-700">Active</label>
    </div>
    {% endif %}
    <button type="submit"
            class="w-full py-3 bg-primary hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors text-sm">
      {% if staff %}Save Changes{% else %}Add Staff{% endif %}
    </button>
  </form>
</div>
{% endblock %}
