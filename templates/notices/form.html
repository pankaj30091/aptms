{% extends "base.html" %}
{% block title %}{% if notice %}Edit Notice{% else %}Post Notice{% endif %}{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-4">
  <a href="{{ url_for('notices.index') }}" class="text-gray-400 hover:text-gray-600">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h2 class="text-xl font-bold">{% if notice %}Edit Notice{% else %}Post Notice{% endif %}</h2>
</div>

<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
      <input type="text" name="title" required value="{{ notice.title if notice else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Body <span class="text-red-500">*</span></label>
      <textarea name="body" rows="5" required
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none">{{ notice.body if notice else '' }}</textarea>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
        <select name="category" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary">
          <option value="">— None —</option>
          {% for val, label in categories %}
          <option value="{{ val }}" {{ 'selected' if notice and notice.category == val else '' }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Expires On</label>
        <input type="date" name="expires_at"
               value="{{ notice.expires_at.strftime('%Y-%m-%d') if notice and notice.expires_at else '' }}"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
      </div>
    </div>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" name="pinned" value="1" {{ 'checked' if notice and notice.pinned else '' }}
             class="w-4 h-4 rounded text-primary focus:ring-primary" />
      <span class="text-sm font-medium text-gray-700">Pin to top</span>
    </label>
    <button type="submit" class="w-full py-3 bg-primary hover:bg-blue-700 text-white font-semibold rounded-xl text-sm">
      {% if notice %}Save Changes{% else %}Post Notice{% endif %}
    </button>
  </form>
</div>
{% endblock %}
