{% extends "base.html" %}
{% block title %}{% if task %}Edit Task{% else %}New Task{% endif %}{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-4">
  <a href="{{ url_for('tasks.manage') }}" class="text-gray-400 hover:text-gray-600">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h2 class="text-xl font-bold">{% if task %}Edit Task{% else %}New Task{% endif %}</h2>
</div>

<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
  <form method="POST" class="space-y-4" id="task-form">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
      <input type="text" name="title" required
             value="{{ task.title if task else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea name="description" rows="2"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none">{{ task.description if task and task.description else '' }}</textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Frequency <span class="text-red-500">*</span></label>
      <select name="frequency" id="freq-select" required onchange="updateFields()"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary">
        {% for val, label in frequencies %}
        <option value="{{ val }}" {{ 'selected' if task and task.frequency == val else '' }}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Weekly: day of week -->
    <div id="weekly-field" class="{{ '' if (task and task.frequency == 'weekly') else 'hidden' }}">
      <label class="block text-sm font-medium text-gray-700 mb-1">Day of Week</label>
      <select name="day_of_week"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary">
        {% for i, d in enumerate(days) %}
        <option value="{{ i }}" {{ 'selected' if task and task.day_of_week == i else '' }}>{{ d }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- One-off: specific date -->
    <div id="oneoff-field" class="{{ '' if (task and task.frequency == 'one_off') else 'hidden' }}">
      <label class="block text-sm font-medium text-gray-700 mb-1">Due Date <span class="text-red-500">*</span></label>
      <input type="date" name="one_off_date"
             value="{{ task.one_off_date.isoformat() if task and task.one_off_date else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>

    <!-- Monthly: day of month -->
    <div id="monthly-field" class="{{ '' if (task and task.frequency == 'monthly') else 'hidden' }}">
      <label class="block text-sm font-medium text-gray-700 mb-1">Day of Month (1–31)</label>
      <input type="number" name="day_of_month" min="1" max="31"
             value="{{ task.day_of_month if task and task.day_of_month else 1 }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>

    {% if task %}
    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_active" id="is_active" {{ 'checked' if task.is_active else '' }}
             class="w-4 h-4 text-primary rounded border-gray-300" />
      <label for="is_active" class="text-sm text-gray-700">Active</label>
    </div>
    {% endif %}

    <button type="submit"
            class="w-full py-3 bg-primary hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors text-sm">
      {% if task %}Save Changes{% else %}Create Task{% endif %}
    </button>
  </form>
</div>

<script>
function updateFields() {
  const freq = document.getElementById('freq-select').value;
  document.getElementById('weekly-field').classList.toggle('hidden', freq !== 'weekly');
  document.getElementById('monthly-field').classList.toggle('hidden', freq !== 'monthly');
  document.getElementById('oneoff-field').classList.toggle('hidden', freq !== 'one_off');
}
</script>
{% endblock %}
