{% extends "base.html" %}
{% block title %}{% if user %}Edit User{% else %}New User{% endif %}{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-4">
  <a href="{{ url_for('users.list_users') }}" class="text-gray-400 hover:text-gray-600">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h2 class="text-xl font-bold">{% if user %}Edit User{% else %}New User{% endif %}</h2>
</div>

<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
  <form method="POST" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Full Name <span class="text-red-500">*</span></label>
      <input type="text" name="full_name" required
             value="{{ user.full_name if user else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>

    {% if not user %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
      <input type="email" name="email" required
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    {% else %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <p class="px-4 py-3 bg-gray-50 rounded-xl text-sm text-gray-600">{{ user.email }}</p>
    </div>
    {% endif %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Role <span class="text-red-500">*</span></label>
      <select name="role" required
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-white">
        <option value="">Select role…</option>
        <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Admin</option>
        <option value="manager" {% if user and user.role == 'manager' %}selected{% endif %}>Manager</option>
        <option value="resident" {% if user and user.role == 'resident' %}selected{% endif %}>Resident</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
      <input type="tel" name="phone"
             value="{{ user.phone if user and user.phone else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Flat Number</label>
      <input type="text" name="flat_number"
             value="{{ user.flat_number if user and user.flat_number else '' }}"
             placeholder="e.g. A-101"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        {% if user %}New Password <span class="text-gray-400 font-normal">(leave blank to keep current)</span>
        {% else %}Password <span class="text-red-500">*</span>{% endif %}
      </label>
      <input type="password" name="{% if user %}new_password{% else %}password{% endif %}"
             {% if not user %}required{% endif %} minlength="8"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>

    {% if user %}
    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_active" id="is_active"
             {% if user.is_active %}checked{% endif %}
             class="w-4 h-4 text-primary rounded border-gray-300" />
      <label for="is_active" class="text-sm text-gray-700">Account active</label>
    </div>
    {% endif %}

    <button type="submit"
            class="w-full py-3 bg-primary hover:bg-primary-dark text-white font-semibold rounded-xl transition-colors text-sm">
      {% if user %}Save Changes{% else %}Create User{% endif %}
    </button>
  </form>
</div>
{% endblock %}
