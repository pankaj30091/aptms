{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="mb-4">
  <h2 class="text-xl font-bold">Change Password</h2>
</div>
<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
      <input type="password" name="current_password" required
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
      <input type="password" name="new_password" required minlength="8"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
      <input type="password" name="confirm_password" required minlength="8"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <button type="submit"
            class="w-full py-3 bg-primary hover:bg-primary-dark text-white font-semibold rounded-xl transition-colors text-sm">
      Update Password
    </button>
  </form>
</div>
{% endblock %}
