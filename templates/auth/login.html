{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="w-full max-w-sm mx-auto">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-primary">AptMS</h1>
    <p class="text-gray-500 mt-1 text-sm">Apartment Management System</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
        {% if category == 'danger' %}bg-red-50 text-red-700 border border-red-200
        {% elif category == 'success' %}bg-green-50 text-green-700 border border-green-200
        {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required autocomplete="email"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
               placeholder="you@example.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
               placeholder="••••••••" />
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" name="remember" id="remember"
               class="w-4 h-4 text-primary rounded border-gray-300" />
        <label for="remember" class="text-sm text-gray-600">Remember me</label>
      </div>
      <button type="submit"
              class="w-full py-3 bg-primary hover:bg-primary-dark text-white font-semibold rounded-xl transition-colors text-sm">
        Sign in
      </button>
    </form>
  </div>
</div>
{% endblock %}
