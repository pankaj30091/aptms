{% extends "base.html" %}
{% block title %}{% if doc %}Edit Document{% else %}Add Document{% endif %}{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-4">
  <a href="{{ url_for('documents.index') }}" class="text-gray-400 hover:text-gray-600">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h2 class="text-xl font-bold">{% if doc %}Edit Document{% else %}Add Document{% endif %}</h2>
</div>

<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
      <input type="text" name="title" required value="{{ doc.title if doc else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
      <select name="doc_type" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary">
        <option value="">— Select type —</option>
        {% for val, label in doc_types %}
        <option value="{{ val }}" {{ 'selected' if doc and doc.doc_type == val else '' }}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Vendor / Service Provider</label>
      <input type="text" name="vendor_name" value="{{ doc.vendor_name if doc and doc.vendor_name else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
        <input type="date" name="start_date" value="{{ doc.start_date.isoformat() if doc and doc.start_date else '' }}"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
        <input type="date" name="end_date" value="{{ doc.end_date.isoformat() if doc and doc.end_date else '' }}"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Document URL</label>
      <input type="url" name="document_url" value="{{ doc.document_url if doc and doc.document_url else '' }}"
             placeholder="https://drive.google.com/…"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
      <textarea name="notes" rows="3"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none">{{ doc.notes if doc and doc.notes else '' }}</textarea>
    </div>
    <button type="submit" class="w-full py-3 bg-primary hover:bg-blue-700 text-white font-semibold rounded-xl text-sm">
      {% if doc %}Save Changes{% else %}Add Document{% endif %}
    </button>
  </form>
</div>
{% endblock %}
