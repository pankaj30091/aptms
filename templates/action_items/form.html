{% extends "base.html" %}
{% block title %}{% if item %}Edit Action Item{% else %}New Action Item{% endif %}{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-4">
  <a href="{{ url_for('action_items.index') }}" class="text-gray-400 hover:text-gray-600">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h2 class="text-xl font-bold">{% if item %}Edit Action Item{% else %}New Action Item{% endif %}</h2>
</div>

<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
      <input type="text" name="title" required value="{{ item.title if item else '' }}"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea name="description" rows="3"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none">{{ item.description if item and item.description else '' }}</textarea>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
        <select name="priority" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary">
          {% for val, label in priorities %}
          <option value="{{ val }}" {{ 'selected' if item and item.priority == val else ('selected' if not item and val == 'medium' else '') }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select name="status" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary">
          {% for val, label in [('open','Open'),('in_progress','In Progress'),('blocked','Blocked'),('done','Done'),('cancelled','Cancelled')] %}
          <option value="{{ val }}" {{ 'selected' if item and item.status == val else ('selected' if not item and val == 'open' else '') }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Owner</label>
      <select name="owner_id" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary">
        <option value="">— Unassigned —</option>
        {% for m in managers %}
        <option value="{{ m.id }}" {{ 'selected' if item and item.owner_id == m.id else '' }}>{{ m.full_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Budget (₹)</label>
        <input type="number" name="budget_inr" min="0" step="100"
               value="{{ item.budget_inr|int if item and item.budget_inr else '' }}"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Target Date</label>
        <input type="date" name="target_date"
               value="{{ item.target_date.isoformat() if item and item.target_date else '' }}"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
      </div>
    </div>
    <button type="submit" class="w-full py-3 bg-primary hover:bg-blue-700 text-white font-semibold rounded-xl text-sm">
      {% if item %}Save Changes{% else %}Create{% endif %}
    </button>
  </form>
</div>
{% endblock %}
