services:
  - type: web
    name: aptms
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --worker-class gthread --workers 2 --threads 4 --bind 0.0.0.0:$PORT --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # paste Internal Database URL from your manually created Render PostgreSQL
      - key: BUILDING_NAME
        value: My Apartment Complex
      - key: BUILDING_LATITUDE
        value: "18.5204"
      - key: BUILDING_LONGITUDE
        value: "73.8567"
      - key: GEOFENCE_RADIUS_M
        value: "50"
      - key: SEED_ADMIN_EMAIL
        value: admin@aptms.local
      - key: SEED_ADMIN_PASSWORD
        sync: false   # set manually in Render dashboard
